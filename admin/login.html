<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | AutoShine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080a0f;
            --bg-card: #0d1117;
            --gold: #C9A84C;
            --gold-light: #e0c066;
            --gold-dark: #a88a3a;
            --blue: #1A6CF5;
            --text: #e8eaed;
            --text-muted: #8a8f98;
            --input-bg: #111620;
            --border: rgba(201, 168, 76, 0.3);
            --error: #ff5f5f;
            --success: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(201, 168, 76, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201, 168, 76, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
            20%, 40%, 60%, 80% { transform: translateX(8px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 420px;
            animation: fadeIn 0.6s ease-out;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow:
                0 0 40px rgba(201, 168, 76, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s ease;
        }

        .login-card.shake { animation: shake 0.5s ease; }

        .card-header { text-align: center; margin-bottom: 1.75rem; }
        .lock-icon { font-size: 1.5rem; margin-bottom: 0.5rem; opacity: 0.8; }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: var(--gold);
            letter-spacing: 3px;
            line-height: 1;
        }

        .portal-subtitle {
            font-size: 0.85rem;
            color: var(--gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 0.25rem;
            font-weight: 600;
        }

        .divider {
            width: 60px; height: 2px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 1rem auto;
        }

        .restricted-text { font-size: 0.8rem; color: var(--text-muted); }

        .form-group { margin-bottom: 1.25rem; }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .input-wrapper { position: relative; }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="password"]:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
        }

        .form-group input::placeholder { color: rgba(138, 143, 152, 0.5); }

        .password-toggle {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s ease;
        }

        .password-toggle:hover { color: var(--gold); }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .remember-row input[type="checkbox"] {
            appearance: none;
            width: 18px; height: 18px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .remember-row input[type="checkbox"]:checked {
            background: var(--gold);
            border-color: var(--gold);
        }

        .remember-row input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #080a0f;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .remember-row label {
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--gold);
            color: #080a0f;
            border: none;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover:not(:disabled) {
            background: var(--gold-light);
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
            transform: translateY(-1px);
        }

        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(8, 10, 15, 0.3);
            border-top-color: #080a0f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .login-btn.loading .spinner { display: inline-block; }

        .error-box {
            display: none;
            margin-top: 1rem;
            padding: 0.875rem 1rem;
            background: rgba(255, 95, 95, 0.08);
            border: 1px solid rgba(255, 95, 95, 0.3);
            border-radius: 8px;
            color: var(--error);
            font-size: 0.85rem;
            text-align: center;
        }

        .error-box.visible { display: block; animation: fadeIn 0.3s ease; }

        .success-box {
            display: none;
            margin-top: 1rem;
            padding: 0.875rem 1rem;
            background: rgba(37, 211, 102, 0.08);
            border: 1px solid rgba(37, 211, 102, 0.3);
            border-radius: 8px;
            color: var(--success);
            font-size: 0.85rem;
            text-align: center;
        }

        .success-box.visible { display: block; animation: fadeIn 0.3s ease; }

        .card-footer { margin-top: 1.5rem; text-align: center; }
        .help-text { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.75rem; }

        .back-link {
            font-size: 0.9rem;
            color: var(--gold);
            text-decoration: none;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .back-link:hover { color: var(--gold-light); }

        .security-badges {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.5rem; }
            .logo { font-size: 2rem; }
            .security-badges { gap: 1rem; flex-wrap: wrap; }
        }
    </style>
<script src="../config.js"></script>
</head>
<body>

<div class="login-container">
    <div class="login-card" id="loginCard">

        <!-- HEADER -->
        <div class="card-header">
            <div class="lock-icon">🔒</div>
            <div class="logo">AutoShine</div>
            <div class="portal-subtitle">Admin Portal</div>
            <div class="divider"></div>
            <div class="restricted-text">
                Restricted Access — Authorized Personnel Only
            </div>
        </div>
        <!-- END HEADER -->

        <!-- FORM -->
        <form class="login-form" id="loginForm">

            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter admin username" 
                    autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        autocomplete="current-password">
                    <button 
                        type="button" 
                        class="password-toggle" 
                        id="togglePassword">👁</button>
                </div>
            </div>

            <div class="remember-row">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text">LOGIN TO DASHBOARD</span>
            </button>

            <div class="error-box" id="errorBox">
                Invalid username or password. Please try again.
            </div>

            <div class="success-box" id="successBox">
                Login successful! Redirecting...
            </div>

        </form>
        <!-- END FORM -->

        <!-- FOOTER -->
        <div class="card-footer">
            <div class="help-text">Having trouble? Contact your administrator</div>
            <a href="../index.html" class="back-link">← Back to AutoShine.com</a>
            <div class="security-badges">
                <div class="badge"><span>🔒</span><span>256-bit Encrypted</span></div>
                <div class="badge"><span>🛡️</span><span>Secure Login</span></div>
            </div>
        </div>
        <!-- END FOOTER -->

    </div>
</div>

<script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Auto redirect if already logged in
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    (function checkAuth() {
        const token = localStorage.getItem('adminToken');
        const loggedIn = localStorage.getItem('adminLoggedIn');
        if (token && loggedIn === 'true') {
            window.location.href = 'dashboard.html';
        }
    })();

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // DOM Elements
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const loginForm = document.getElementById('loginForm');
    const loginCard = document.getElementById('loginCard');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const rememberMe = document.getElementById('rememberMe');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = loginBtn.querySelector('.btn-text');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Load remembered username
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    (function loadRemembered() {
        const saved = localStorage.getItem('adminUsername');
        if (saved) {
            usernameInput.value = saved;
            rememberMe.checked = true;
        }
    })();

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Password toggle
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    togglePassword.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        togglePassword.textContent = isPassword ? '👁‍🗨' : '👁';
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Clear error on typing
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    [usernameInput, passwordInput].forEach(input => {
        input.addEventListener('input', () => {
            errorBox.classList.remove('visible');
            loginCard.classList.remove('shake');
        });
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Form Submit Handler
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
            showError('Please enter both username and password.');
            return;
        }

        setLoading(true);
        errorBox.classList.remove('visible');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // REAL LOGIN — verified by your backend (Render)
        // No credentials are stored or checked in this file.
        // The backend checks ADMIN_USERNAME / ADMIN_PASSWORD
        // (env variables set on Render) and returns a signed
        // JWT only if they match.
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━
        try {
            const response = await fetch(`${API_BASE_URL}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (response.ok && data.token) {
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminLoggedIn', 'true');

                if (rememberMe.checked) {
                    localStorage.setItem('adminUsername', username);
                } else {
                    localStorage.removeItem('adminUsername');
                }

                successBox.classList.add('visible');
                btnText.textContent = '✅ Redirecting...';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            } else {
                setLoading(false);
                passwordInput.value = '';
                passwordInput.focus();
                showError(data.error || 'Invalid username or password. Please try again.');
            }
        } catch (err) {
            setLoading(false);
            passwordInput.value = '';
            passwordInput.focus();
            showError('Could not reach the server. Check API_BASE_URL in config.js.');
        }
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Helper Functions
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function setLoading(loading) {
        if (loading) {
            loginBtn.disabled = true;
            loginBtn.classList.add('loading');
            btnText.textContent = 'Logging in...';
        } else {
            loginBtn.disabled = false;
            loginBtn.classList.remove('loading');
            btnText.textContent = 'LOGIN TO DASHBOARD';
        }
    }

    function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.add('visible');
        loginCard.classList.remove('shake');
        void loginCard.offsetWidth;
        loginCard.classList.add('shake');
    }
</script>

</body>
</html>
